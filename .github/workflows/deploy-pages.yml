name: Deploy GitHub Pages

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build Tailwind CSS
              run: npm run build:css

            - name: Prepare deploy artifact
              run: |
                  mkdir -p dist
                  # Copy only tracked files into dist (avoids including dev files or node_modules)
                  git checkout-index -a -f --prefix=dist/
                  # Copy the freshly-built Tailwind CSS (untracked build artifact)
                  cp tailwind.css dist/tailwind.css

            - name: Configure GitHub Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
